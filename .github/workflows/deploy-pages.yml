name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        env:
          # 공개 API URL이라 Variables 권장. Secrets도 허용.
          # 예: https://sy-universe-api.onrender.com/api
          # ※ Environment(github-pages) 시크릿이 아니라 Repository secrets/variables 에 넣어야 함
          VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL }}
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "::error::VITE_API_URL 이 비어 있습니다."
            echo "Settings → Secrets and variables → Actions 에서"
            echo "  Variables 탭 → New repository variable"
            echo "  Name: VITE_API_URL"
            echo "  Value: https://sy-universe-api.onrender.com/api"
            echo "Environment(github-pages) 전용 시크릿에 넣으면 build job에서 읽히지 않습니다."
            exit 1
          fi
          echo "VITE_API_URL host=$(echo "$VITE_API_URL" | sed -E 's#https?://([^/]+).*#\1#')"
          npm run build -w web

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
